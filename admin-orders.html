<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Commandes reçues</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #0a0a0a; color: #fff; }
        .orders-list { max-width: 900px; margin: 60px auto; background: #181818; border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,0.3); padding: 32px 18px; }
        .order-block { background: #222; border-radius: 10px; margin-bottom: 28px; padding: 18px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.10); }
        .order-block h3 { color: #ff3c00; margin-bottom: 8px; font-size: 1.2rem; }
        .order-block .meta { color: #bbb; font-size: 0.98rem; margin-bottom: 8px; }
        .order-block .products { margin-bottom: 8px; }
        .order-block .products li { margin-bottom: 3px; }
        .order-block .total { color: #4caf50; font-weight: 600; }
        .order-block .status { color: #ffb300; font-weight: 500; }
    </style>
</head>
<body>
    <div class="orders-list">
        <h1 style="text-align:center;color:#ff3c00;">Commandes reçues (Admin)</h1>
        <div id="orders"></div>
    </div>
    <script>
    fetch('api/list-orders.php')
      .then(r => r.json())
      .then(orders => {
        if (!orders.length) {
          document.getElementById('orders').innerHTML = '<p style="color:#bbb">Aucune commande trouvée.</p>';
          return;
        }
        document.getElementById('orders').innerHTML = orders.map(order => `
          <div class='order-block'>
            <h3>Commande #${order.orderId}</h3>
            <div class='meta'>${order.timestamp} | ${order.customer_name} | ${order.customer_city} | ${order.customer_phone}</div>
            <ul class='products'>
              ${order.items.map(item => `<li>${item.name}${item.variant ? " <span style=\"color:#bbb\">(" + item.variant + ")</span>" : ""} x${item.quantity} - <span style=\"color:#ff3c00\">${item.price} MAD</span></li>`).join('')}
            </ul>
            <div class='total'>Total: ${order.total} MAD</div>
            <div class='status'>Statut: ${order.status}</div>
          </div>
        `).join('');
      });
    </script>
</body>
</html>
