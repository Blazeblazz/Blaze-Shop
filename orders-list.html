<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BLAZE Orders</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>BLAZE Orders</h1>
    <table id="orders-table">
        <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>City</th>
            <th>Product</th>
            <th>Variant</th>
            <th>Date</th>
        </tr>
    </table>

    <script src="js/stored-orders.js"></script>
    <script>
        // Load orders from localStorage
        try {
            const saved = localStorage.getItem('storedOrders');
            if (saved) storedOrders = JSON.parse(saved);
        } catch (e) {
            console.error('Error loading orders:', e);
        }
        
        // Display orders
        const table = document.getElementById('orders-table');
        if (storedOrders && storedOrders.orders && storedOrders.orders.length > 0) {
            storedOrders.orders.forEach(order => {
                order.items.forEach(item => {
                    const row = table.insertRow();
                    row.insertCell(0).textContent = order.name;
                    row.insertCell(1).textContent = order.phone;
                    row.insertCell(2).textContent = order.city;
                    row.insertCell(3).textContent = item.name;
                    row.insertCell(4).textContent = item.variant || 'Standard';
                    
                    const date = new Date(order.date);
                    row.insertCell(5).textContent = `${date.getDate()}/${date.getMonth()+1}/${date.getFullYear()}`;
                });
            });
        } else {
            const row = table.insertRow();
            const cell = row.insertCell(0);
            cell.colSpan = 6;
            cell.textContent = "No orders found";
            cell.style.textAlign = "center";
            cell.style.padding = "20px";
        }
    </script>
</body>
</html>
