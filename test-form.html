<!DOCTYPE html>
<html>
<head>
  <title>Test Google Form Integration</title>
  <style>
    body { font-family: Arial; margin: 20px; max-width: 600px; }
    button { padding: 10px; background: #ff3c00; color: white; border: none; cursor: pointer; }
    .result { margin-top: 20px; padding: 10px; background: #f0f0f0; }
  </style>
</head>
<body>
  <h1>Test Google Form Integration</h1>
  <p>Click the button below to test the Google Form integration:</p>
  <button id="test-button">Send Test Order</button>
  <div class="result" id="result"></div>

  <script src="js/google-form-orders.js"></script>
  <script>
    document.getElementById('test-button').addEventListener('click', function() {
      // Create a test order
      const testOrder = {
        customer: {
          fullname: "Test Customer",
          phone: "0612345678",
          city: "Test City"
        },
        items: [
          {
            name: "Test Product",
            variant: "Test Variant",
            quantity: 1
          }
        ],
        total: 299,
        orderNumber: "TEST-" + new Date().getTime()
      };
      
      // Show the order details
      document.getElementById('result').innerHTML = 
        "<p>Sending test order...</p>" +
        "<pre>" + JSON.stringify(testOrder, null, 2) + "</pre>";
      
      // Submit to Google Form
      submitOrderToGoogleForm(testOrder);
      
      // Update result
      setTimeout(function() {
        document.getElementById('result').innerHTML += 
          "<p>Order submitted! Check your Google Sheet to see if it was received.</p>";
      }, 1000);
    });
  </script>
</body>
</html>
