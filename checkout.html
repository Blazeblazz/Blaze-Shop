<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commande - BLAZE | T-Shirts au Maroc</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="nav">
        <div class="nav-logo">
            <a href="index-award.html">BLAZE</a>
        </div>
    </nav>

    <section class="checkout-section">
        <div class="checkout-container">
            <h1 class="section-title">Finaliser votre commande</h1>
            
            <div class="checkout-content">
                <div class="order-summary" id="order-summary">
                    <h3>Résumé de la commande</h3>
                    <div id="order-items"></div>
                    <div class="order-total" id="order-total"></div>
                </div>

                <form class="checkout-form" id="checkout-form">
                    <h3>Informations de livraison</h3>
                    
                    <div class="form-group">
                        <label for="customer-name">Nom complet *</label>
                        <input type="text" id="customer-name" name="name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="customer-city">Ville *</label>
                        <input type="text" id="customer-city" name="city" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="customer-phone">Numéro de téléphone *</label>
                        <input type="tel" id="customer-phone" name="phone" required>
                    </div>
                    
                    <div class="delivery-info">
                        <div class="delivery-item">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>
                            <span>Livraison gratuite dans tout le Maroc</span>
                        </div>
                        <div class="delivery-item">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            <span>Paiement à la livraison</span>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn">Confirmer la commande</button>
                </form>
            </div>
        </div>
    </section>

    <style>
        .checkout-section {
            min-height: 100vh;
            padding: 150px 10% 60px;
            background: linear-gradient(135deg, #0a0a0a 0%, #151515 100%);
        }
        
        .checkout-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .checkout-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 40px;
        }
        
        .order-summary {
            background: rgba(21, 21, 21, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            height: fit-content;
        }
        
        .order-summary h3 {
            color: #ff3c00;
            margin-bottom: 20px;
            font-size: 1.3rem;
            font-weight: 600;
        }
        
        .order-item {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .order-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .order-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            margin-right: 15px;
            background: white;
            padding: 10px;
        }
        
        .order-item-info h4 {
            color: #fff;
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        .order-item-info p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            margin-bottom: 3px;
        }
        
        .order-total {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ff3c00;
            text-align: right;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid rgba(255, 60, 0, 0.3);
        }
        
        .checkout-form {
            background: rgba(21, 21, 21, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
        }
        
        .checkout-form h3 {
            color: #ff3c00;
            margin-bottom: 25px;
            font-size: 1.3rem;
            font-weight: 600;
        }
        
        .delivery-info {
            background: rgba(255, 60, 0, 0.1);
            border: 1px solid rgba(255, 60, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin: 25px 0;
        }
        
        .delivery-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
        }
        
        .delivery-item:last-child {
            margin-bottom: 0;
        }
        
        .delivery-item svg {
            color: #ff3c00;
            margin-right: 10px;
            flex-shrink: 0;
        }
        
        @media (max-width: 768px) {
            .checkout-section {
                padding: 100px 20px 40px;
            }
            
            .checkout-content {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            
            .order-summary,
            .checkout-form {
                padding: 20px;
            }
            
            .order-item img {
                width: 60px;
                height: 60px;
            }
        }
    </style>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const orderData = JSON.parse(sessionStorage.getItem('directOrder'));
            
            if (!orderData || orderData.length === 0) {
                window.location.href = 'products.html';
                return;
            }

            displayOrderSummary(orderData);
            
            document.getElementById('checkout-form').addEventListener('submit', function(e) {
                e.preventDefault();
                submitOrder(orderData);
            });
        });

        function displayOrderSummary(orderData) {
            const itemsContainer = document.getElementById('order-items');
            const totalContainer = document.getElementById('order-total');
            let total = 0;

            orderData.forEach(item => {
                const orderItem = document.createElement('div');
                orderItem.className = 'order-item';
                orderItem.innerHTML = `
                    <img src="${item.image}" alt="${item.name}">
                    <div class="order-item-info">
                        <h4>${item.name}</h4>
                        <p>Couleur: ${item.variant}</p>
                        <p>Quantité: ${item.quantity}</p>
                        <p><strong>${item.price * item.quantity} MAD</strong></p>
                    </div>
                `;
                itemsContainer.appendChild(orderItem);
                total += item.price * item.quantity;
            });

            totalContainer.textContent = `Total: ${total} MAD`;
        }

        function submitOrder(orderData) {
            const formData = new FormData(document.getElementById('checkout-form'));
            const customerInfo = {
                name: formData.get('name'),
                city: formData.get('city'),
                phone: formData.get('phone')
            };

            const order = {
                id: Date.now(),
                date: new Date().toISOString(),
                customer: customerInfo,
                items: orderData,
                total: orderData.reduce((sum, item) => sum + (item.price * item.quantity), 0),
                status: 'pending'
            };

            // Store order in localStorage (in production, send to server)
            const existingOrders = JSON.parse(localStorage.getItem('orders') || '[]');
            existingOrders.push(order);
            localStorage.setItem('orders', JSON.stringify(existingOrders));

            // Clear session storage
            sessionStorage.removeItem('directOrder');

            // Show success message with theme styling
            showSuccessMessage();
        }
        
        function showSuccessMessage() {
            const successDiv = document.createElement('div');
            successDiv.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(21, 21, 21, 0.95);
                backdrop-filter: blur(20px);
                border: 2px solid #ff3c00;
                border-radius: 15px;
                padding: 40px;
                text-align: center;
                z-index: 10000;
                color: white;
                max-width: 400px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            `;
            
            successDiv.innerHTML = `
                <div style="color: #ff3c00; font-size: 3rem; margin-bottom: 20px;">✓</div>
                <h3 style="color: #ff3c00; margin-bottom: 15px;">Commande confirmée!</h3>
                <p style="margin-bottom: 25px; opacity: 0.9;">Nous vous contacterons bientôt pour confirmer votre commande.</p>
                <button onclick="this.parentElement.remove(); window.location.href='index-award.html';" 
                        style="background: #ff3c00; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: 600;">
                    Retour à l'accueil
                </button>
            `;
            
            document.body.appendChild(successDiv);
        }
    </script>
</body>
</html>
