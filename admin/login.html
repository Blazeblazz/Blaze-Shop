<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLAZE | Admin Login</title>
    <link rel="icon" href="../favicon/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF0000;
            --secondary-color: #000000;
            --background-color: #FFFFFF;
            --text-color: #333333;
            --border-color: #DDDDDD;
            --error-color: #FF0000;
            --success-color: #28a745;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
        }
        
        body {
            background-color: #f8f8f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }
        
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f8f8f8 0%, #e6e6e6 100%);
            z-index: -1;
        }
        
        .background::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,0,0,0.05) 0%, rgba(255,0,0,0) 70%);
            animation: pulse 15s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 0.5; }
        }
        
        .login-container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }
        
        .login-header {
            background-color: var(--secondary-color);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }
        
        .login-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--primary-color);
        }
        
        .login-logo {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        
        .login-subtitle {
            font-size: 14px;
            opacity: 0.8;
        }
        
        .login-body {
            padding: 40px 30px;
        }
        
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-color);
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            font-size: 16px;
            transition: all 0.3s ease;
            background-color: #f9f9f9;
        }
        
        .form-group input:focus {
            border-color: var(--primary-color);
            outline: none;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(255, 0, 0, 0.1);
        }
        
        .form-group .input-icon {
            position: absolute;
            right: 15px;
            top: 40px;
            color: #999;
        }
        
        .login-button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 6px rgba(255, 0, 0, 0.2);
        }
        
        .login-button:hover {
            background-color: #cc0000;
        }
        
        .login-button:active {
            transform: translateY(1px);
        }
        
        .error-message {
            background-color: rgba(255, 0, 0, 0.1);
            color: var(--error-color);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            border-left: 4px solid var(--error-color);
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        
        .back-link a {
            color: #666;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .back-link a:hover {
            color: var(--primary-color);
        }
        
        .show-password {
            position: absolute;
            right: 15px;
            top: 42px;
            cursor: pointer;
            color: #999;
            user-select: none;
        }
        
        @media (max-width: 480px) {
            .login-container {
                max-width: 100%;
                margin: 15px;
                border-radius: 8px;
            }
            
            .login-header {
                padding: 20px;
            }
            
            .login-body {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">BLAZE ADMIN</div>
            <div class="login-subtitle">Panneau d'administration</div>
        </div>
        
        <div class="login-body">
            <div id="error-message" class="error-message">
                <strong>Erreur:</strong> Nom d'utilisateur ou mot de passe incorrect
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Nom d'utilisateur</label>
                    <input type="text" id="username" name="username" placeholder="Entrez votre nom d'utilisateur" required autocomplete="username">
                    <span class="input-icon">👤</span>
                </div>
                
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" placeholder="Entrez votre mot de passe" required autocomplete="current-password">
                    <span class="show-password" id="toggle-password">👁️</span>
                </div>
                
                <button type="submit" class="login-button">Se connecter</button>
            </form>
            
            <div class="back-link">
                <a href="../index-award.html">← Retour au site</a>
            </div>
        </div>
    </div>

    <script>
        // Toggle password visibility
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                this.textContent = '🔒';
            } else {
                passwordInput.type = 'password';
                this.textContent = '👁️';
            }
        });
        
        // Handle login form submission
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Simple authentication - in a real app, this would be server-side
            if (username === 'admin' && password === 'Blaze03..$') {
                // Show loading state
                const loginButton = document.querySelector('.login-button');
                loginButton.textContent = 'Connexion en cours...';
                loginButton.disabled = true;
                
                // Store authentication in sessionStorage
                sessionStorage.setItem('blazeAdminAuth', btoa(username + ':' + password));
                
                // Redirect to admin panel after a short delay
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 800);
            } else {
                document.getElementById('error-message').style.display = 'block';
                
                // Shake effect on error
                const loginContainer = document.querySelector('.login-container');
                loginContainer.style.animation = 'shake 0.5s';
                
                setTimeout(() => {
                    loginContainer.style.animation = '';
                }, 500);
            }
        });
        
        // Add shake animation
        document.head.insertAdjacentHTML('beforeend', `
            <style>
                @keyframes shake {
                    0%, 100% { transform: translateX(0); }
                    10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                    20%, 40%, 60%, 80% { transform: translateX(5px); }
                }
            </style>
        `);
    </script>
</body>
</html>
