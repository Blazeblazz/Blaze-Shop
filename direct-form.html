<!DOCTYPE html>
<html>
<head>
  <title>BLAZE Order Form</title>
  <style>
    body { font-family: Arial; margin: 20px; max-width: 600px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; }
    input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
    button { padding: 10px 15px; background: #ff3c00; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h1>BLAZE Order Form</h1>
  <p>Use this form to manually enter orders:</p>
  
  <!-- Replace the action URL with your actual Google Form URL -->
  <form action="https://docs.google.com/forms/d/e/YOUR_FORM_ID/formResponse" method="POST" target="_blank">
    <div class="form-group">
      <label for="name">Customer Name:</label>
      <!-- Replace entry.123456789 with your actual field ID -->
      <input type="text" id="name" name="entry.123456789" required>
    </div>
    
    <div class="form-group">
      <label for="phone">Phone Number:</label>
      <!-- Replace entry.234567890 with your actual field ID -->
      <input type="text" id="phone" name="entry.234567890" required>
    </div>
    
    <div class="form-group">
      <label for="city">City:</label>
      <!-- Replace entry.345678901 with your actual field ID -->
      <input type="text" id="city" name="entry.345678901" required>
    </div>
    
    <div class="form-group">
      <label for="product">Product:</label>
      <!-- Replace entry.456789012 with your actual field ID -->
      <input type="text" id="product" name="entry.456789012" required>
    </div>
    
    <div class="form-group">
      <label for="variant">Variant:</label>
      <!-- Replace entry.567890123 with your actual field ID -->
      <input type="text" id="variant" name="entry.567890123" required>
    </div>
    
    <div class="form-group">
      <label for="quantity">Quantity:</label>
      <!-- Replace entry.678901234 with your actual field ID -->
      <input type="number" id="quantity" name="entry.678901234" required min="1" value="1">
    </div>
    
    <div class="form-group">
      <label for="total">Total (MAD):</label>
      <!-- Replace entry.789012345 with your actual field ID -->
      <input type="number" id="total" name="entry.789012345" required value="299">
    </div>
    
    <div class="form-group">
      <label for="orderNumber">Order Number:</label>
      <!-- Replace entry.890123456 with your actual field ID -->
      <input type="text" id="orderNumber" name="entry.890123456" value="MANUAL-ORDER">
    </div>
    
    <button type="submit">Submit Order</button>
  </form>
  
  <script>
    // Generate a unique order number
    document.getElementById('orderNumber').value = 'MANUAL-' + new Date().getTime();
  </script>
</body>
</html>
